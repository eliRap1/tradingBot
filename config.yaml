  # Crypto (traded 24/7 on Alpaca)
  crypto:
    - BTC/USD
    - ETH/USD
    - SOL/USD
    - AVAX/USD
    - LINK/USD
    - DOGE/USD
  # Crypto-specific risk overrides (wider stops for higher volatility)
  crypto_risk:
    stop_loss_atr_mult: 2.5       # wider SL for crypto volatility
    take_profit_atr_mult: 5.0     # wider TP to match
    trailing_stop_pct: 0.05       # 5% trail (crypto swings more)
    min_risk_reward: 1.8          # Lower R:R for crypto (more volatile)

strategies:
  momentum:
    rsi_period: 14
    rsi_overbought: 70
    rsi_oversold: 30
    roc_period: 10
    ema_fast: 8
    ema_slow: 21
    weight: 0.25

  mean_reversion:
    bb_period: 20
    bb_std: 2.0
    zscore_threshold: 1.5
    rsi_period: 14
    weight: 0.15

  breakout:
    volume_multiplier: 1.5
    atr_period: 14
    lookback_days: 20
    weight: 0.2

  supertrend:
    atr_period: 10
    multiplier: 3.0
    weight: 0.25

  stoch_rsi:
    rsi_period: 14
    stoch_period: 14
    k_smooth: 3
    d_smooth: 3
    ema_period: 50
    oversold: 20
    overbought: 80
    weight: 0.15

  vwap_reclaim:
    weight: 0.15

  gap:
    min_gap_pct: 1.5
    strong_gap_pct: 3.0
    weight: 0.15

  liquidity_sweep:
    pivot_lookback: 10           # bars each side for swing high/low detection
    sweep_tolerance_pct: 0.005   # max 0.5% beyond level (more = real breakout)
    min_wick_body_ratio: 2.0     # rejection wick must be 2x the candle body
    min_volume_ratio: 1.5        # volume must be 1.5x average on sweep
    min_confluence: 3            # need 3+ confirming factors to fire
    weight: 0.20                 # higher weight — sweeps are high-probability

signals:
  min_composite_score: 0.25        # Restored — 0.20 lets too many marginal signals through
  max_positions: 10                # Balanced (12 × 10% = 120% exposure was too high)
  min_agreeing_strategies: 3       # Restored — 2/7 agreement is coin-flip territory
  max_crypto_positions: 3          # Up to 3 crypto positions
  min_crypto_agreeing: 2           # crypto needs only 2/5 strategies
  min_crypto_score: 0.15           # Restored — 0.12 too loose for volatile crypto
  allow_shorts_in_bull: false      # Shorts in bull regime rarely pays off
  entry_timeframe: "5Min"          # 5-min candles for entries
  trend_timeframe: "1Day"          # daily candles for trend context
  intraday_lookback_days: 5        # how many days of 5-min bars to fetch

risk:
  max_position_pct: 0.08           # 8% per position (10% × 10 = 100% was borderline)
  max_portfolio_risk_pct: 0.015    # 1.5% risk per trade (2% × 10 = 20% account risk)
  stop_loss_atr_mult: 2.0          # Restored — 1.5× on 5-min ATR is noise, constant stops
  take_profit_atr_mult: 5.0        # Bigger targets = let winners run (good change)
  min_risk_reward: 2.5             # Only take 2.5:1 R:R or better (good change)
  max_drawdown_pct: 0.10           # Restored — 12% is too much for paper testing
  trailing_stop_pct: 0.025         # Tighter trail to lock profits (was 3%)
  chandelier_atr_mult: 3.0         # ATR multiplier for Chandelier trailing stop
  max_checks_no_1r: 60             # Close if no 1R profit after 60 check cycles (~5 hours)
  partial_exit_enabled: true       # Take partial profits
  partial_exit_r: 1.2              # Take first partial earlier at 1.2R (was 1.5R)
  partial_exit_pct: 0.40           # Close 40% at first target (was 50%)
  second_partial_enabled: true     # NEW: Second partial exit
  second_partial_r: 2.5            # NEW: Take more at 2.5R
  second_partial_pct: 0.30         # NEW: Close 30% more
  daily_loss_limit_pct: 0.025      # 2.5% daily loss limit - tighter (was 3%)
  sizing_method: "volatility_adjusted"  # Volatility-adjusted sizing
  kelly_fraction: 0.5
  kelly_min_trades: 30

execution:
  smart_orders: false            # set true to use limit orders with fallback
  limit_offset_pct: 0.0002      # 2 bps better than market
  limit_timeout_sec: 30          # fall back to market after 30s

filters:
  max_correlation: 0.70         # block if correlation > 70%
  correlation_lookback_days: 60
  correlation_cache_minutes: 30

backtest:
  slippage_pct: 0.001           # 10 basis points per fill (stocks)
  spread_pct: 0.0005            # 5 bps estimated half-spread cost per fill (stocks)
  crypto_slippage_pct: 0.002    # 20 bps per fill (wider crypto spreads on Alpaca)
  crypto_spread_pct: 0.001      # 10 bps half-spread for crypto
  volume_impact: true           # extra slippage on large orders
  commission_per_share: 0.0     # Alpaca is commission-free (but spread matters)
  initial_equity: 100000
  # Stocks: ~15 bps round-trip | Crypto: ~60 bps round-trip

alerts:
  enabled: true                  # set to false to disable
  notify_trades: true            # new trade entries/exits
  notify_drawdown: true          # drawdown warnings
  notify_daily_summary: true     # end-of-day performance

sector_regime:
  enabled: true           # set false to disable sector layer entirely
  cache_ttl_sec: 900      # how long to cache sector ETF results (15 min)

optimization:
  train_days: 180
  test_days: 60
  step_days: 30
  metric: "sharpe_ratio"
  max_param_combinations: 200

schedule:
  market_open_delay_min: 15    # skip first 15 min (volatile)
  cycle_interval_sec: 300      # run every 5 minutes
  market_close_buffer_min: 15  # stop new trades 15 min before close
