alpaca:
  paper_url: "https://paper-api.alpaca.markets"
  live_url: "https://api.alpaca.markets"
  data_url: "https://data.alpaca.markets"

screener:
  min_price: 10.0
  max_price: 1000.0
  min_avg_volume: 500000
  # Top liquid stocks - the bot will also filter dynamically
  universe:
    - AAPL
    - MSFT
    - GOOGL
    - AMZN
    - NVDA
    - META
    - TSLA
    - AMD
    - NFLX
    - JPM
    - V
    - MA
    - UNH
    - HD
    - DIS
    - PYPL
    - CRM
    - ADBE
    - INTC
    - CSCO
    - PEP
    - KO
    - COST
    - AVGO
    - QCOM
    - TXN
    - MU
    - AMAT
    - LRCX
    - KLAC
    - MRVL
    - PANW
    - NOW
    - UBER
    - ABNB
    - SQ
    - SHOP
    - SNOW
    - COIN
    - PLTR
  # Crypto (traded 24/7 on Alpaca)
  crypto:
    - BTC/USD
    - ETH/USD
  # Crypto-specific risk overrides (wider stops for higher volatility)
  crypto_risk:
    stop_loss_atr_mult: 2.5       # wider SL for crypto volatility
    take_profit_atr_mult: 5.0     # wider TP to match
    trailing_stop_pct: 0.05       # 5% trail (crypto swings more)

strategies:
  momentum:
    rsi_period: 14
    rsi_overbought: 70
    rsi_oversold: 30
    roc_period: 10
    ema_fast: 8
    ema_slow: 21
    weight: 0.25

  mean_reversion:
    bb_period: 20
    bb_std: 2.0
    zscore_threshold: 1.5
    rsi_period: 14
    weight: 0.15

  breakout:
    volume_multiplier: 1.5
    atr_period: 14
    lookback_days: 20
    weight: 0.2

  supertrend:
    atr_period: 10
    multiplier: 3.0
    weight: 0.25

  stoch_rsi:
    rsi_period: 14
    stoch_period: 14
    k_smooth: 3
    d_smooth: 3
    ema_period: 50
    oversold: 20
    overbought: 80
    weight: 0.15

  vwap_reclaim:
    weight: 0.15

  gap:
    min_gap_pct: 1.5
    strong_gap_pct: 3.0
    weight: 0.15

signals:
  min_composite_score: 0.20        # Lowered for more trades (was 0.25)
  max_positions: 12                # More positions = more profit opportunities (was 9)
  min_agreeing_strategies: 2       # Lowered confluence (was 3) - let more trades through
  max_crypto_positions: 2          # Keep crypto slots
  min_crypto_agreeing: 2           # crypto needs only 2/5 strategies
  min_crypto_score: 0.12           # Lower for more crypto entries (was 0.15)
  allow_shorts_in_bull: true       # Allow shorts even in bull (hedging)
  entry_timeframe: "5Min"          # 5-min candles for entries
  trend_timeframe: "1Day"          # daily candles for trend context
  intraday_lookback_days: 5        # how many days of 5-min bars to fetch

risk:
  max_position_pct: 0.10           # 10% per position for bigger gains (was 8%)
  max_portfolio_risk_pct: 0.02     # 2% risk per trade - more aggressive (was 1.5%)
  stop_loss_atr_mult: 1.5          # Tighter stops = less loss per trade (was 2.0)
  take_profit_atr_mult: 5.0        # Bigger targets = let winners run (was 4.0)
  min_risk_reward: 2.5             # Only take 2.5:1 R:R or better (was 2.0)
  max_drawdown_pct: 0.12           # Slightly higher tolerance (was 10%)
  trailing_stop_pct: 0.025         # Tighter trail to lock profits (was 3%)
  partial_exit_enabled: true       # Take partial profits
  partial_exit_r: 1.2              # Take first partial earlier at 1.2R (was 1.5R)
  partial_exit_pct: 0.40           # Close 40% at first target (was 50%)
  second_partial_enabled: true     # NEW: Second partial exit
  second_partial_r: 2.5            # NEW: Take more at 2.5R
  second_partial_pct: 0.30         # NEW: Close 30% more
  daily_loss_limit_pct: 0.025      # 2.5% daily loss limit - tighter (was 3%)
  sizing_method: "volatility_adjusted"  # NEW: Better sizing (was fixed_fractional)
  kelly_fraction: 0.5
  kelly_min_trades: 30
  # NEW: Profit maximizer settings
  volume_surge_size_boost: 1.2     # Bigger size on high volume signals
  sector_rotation_enabled: true    # Overweight strong sectors
  dynamic_targets_enabled: true    # Use support/resistance for TP/SL

execution:
  smart_orders: false            # set true to use limit orders with fallback
  limit_offset_pct: 0.0002      # 2 bps better than market
  limit_timeout_sec: 30          # fall back to market after 30s

filters:
  max_correlation: 0.70         # block if correlation > 70%
  correlation_lookback_days: 60
  correlation_cache_minutes: 30

backtest:
  slippage_pct: 0.001           # 10 basis points per fill (stocks)
  spread_pct: 0.0005            # 5 bps estimated half-spread cost per fill (stocks)
  crypto_slippage_pct: 0.002    # 20 bps per fill (wider crypto spreads on Alpaca)
  crypto_spread_pct: 0.001      # 10 bps half-spread for crypto
  volume_impact: true           # extra slippage on large orders
  commission_per_share: 0.0     # Alpaca is commission-free (but spread matters)
  initial_equity: 100000
  # Stocks: ~15 bps round-trip | Crypto: ~60 bps round-trip

alerts:
  enabled: true                  # set to false to disable
  notify_trades: true            # new trade entries/exits
  notify_drawdown: true          # drawdown warnings
  notify_daily_summary: true     # end-of-day performance

optimization:
  train_days: 180
  test_days: 60
  step_days: 30
  metric: "sharpe_ratio"
  max_param_combinations: 200

schedule:
  market_open_delay_min: 15    # skip first 15 min (volatile)
  cycle_interval_sec: 300      # run every 5 minutes
  market_close_buffer_min: 15  # stop new trades 15 min before close
