    take_profit_atr_mult: 5.0     # wider TP to match
    trailing_stop_pct: 0.05       # 5% trail (crypto swings more)
    min_risk_reward: 1.8          # Lower R:R for crypto (more volatile)

strategies:
  momentum:
    rsi_period: 14
    rsi_overbought: 70
    rsi_oversold: 30
    roc_period: 10
    ema_fast: 8
    ema_slow: 21
    weight: 0.25

  mean_reversion:
    bb_period: 20
    bb_std: 2.0
    zscore_threshold: 1.5
    rsi_period: 14
    weight: 0.15

  breakout:
    volume_multiplier: 1.5
    atr_period: 14
    lookback_days: 20
    weight: 0.2

  supertrend:
    atr_period: 10
    multiplier: 3.0
    weight: 0.25

  stoch_rsi:
    rsi_period: 14
    stoch_period: 14
    k_smooth: 3
    d_smooth: 3
    ema_period: 50
    oversold: 20
    overbought: 80
    weight: 0.15

  vwap_reclaim:
    weight: 0.15

  gap:
    min_gap_pct: 1.5
    strong_gap_pct: 3.0
    weight: 0.15

  liquidity_sweep:
    pivot_lookback: 10           # bars each side for swing high/low detection
    sweep_tolerance_pct: 0.005   # max 0.5% beyond level (more = real breakout)
    min_wick_body_ratio: 2.0     # rejection wick must be 2x the candle body
    min_volume_ratio: 1.5        # volume must be 1.5x average on sweep
    min_confluence: 3            # need 3+ confirming factors to fire
    weight: 0.20                 # higher weight — sweeps are high-probability

  dol:
    weight: 0.15                 # draw-on-liquidity positional bias (ICT)
    pivot_lookback: 5            # bars each side for OB/swing detection
    fvg_min_atr_mult: 0.1        # min FVG size = 10% of ATR
    ob_displacement_mult: 1.0    # displacement body >= 1.0x ATR
    freshness_decay_bars: 30     # e-folding horizon for time decay
    top_n_levels: 3              # aggregate top N scored levels
    min_verdict: 0.20            # |verdict| gate
    require_htf_align: true      # HTF trend must agree or be neutral
    scan_lookback_bars: 60       # OB/FVG scan window

  futures_trend:
    weight: 0.30                 # futures-only: ORB + session VWAP + ADX + ATR gate

  time_series_momentum:
    weight: 0.30
    lookbacks: [20, 60, 120]
    lookback_weights: [0.50, 0.30, 0.20]
    ema_fast: 20
    ema_slow: 100
    min_abs_score: 0.15
    max_realized_vol: 1.20
    target_annual_vol: 0.35

  donchian_breakout:
    weight: 0.25
    fast_lookback: 20
    slow_lookback: 55
    atr_period: 14
    min_volume_ratio: 1.05
    max_atr_extension: 3.0

  relative_strength_rotation:
    weight: 0.20
    lookbacks: [20, 60, 126]
    lookback_weights: [0.50, 0.30, 0.20]
    top_pct: 0.25
    bottom_pct: 0.20
    min_abs_momentum: 0.02
    allow_shorts: true

signals:
  min_composite_score: 0.23        # Relaxed 0.26->0.23: RS universe pre-filters — double-gating undersampled
  max_positions: 7                 # Concentrated 10->7: top-K carries edge, 8-10 are filler
  min_agreeing_strategies: 3       # Relaxed 4->3: RS universe pre-filters quality; 3/9 still strong confluence
  require_trend_alignment: true    # Daily trend must agree with signal direction
  min_bar_minute: 30               # Skip first 30 min of US session (ET) — open noise
  skip_lunch: false                # Lunch skip was too aggressive — off for now
  min_volume_ratio: 1.2            # Bar volume must be >= 1.2x 20-bar avg
  loss_cooldown_bars: 0            # Disabled — blocked winning re-entries (CSCO)
  min_adx_for_entry: 20.0          # Skip chop — ADX < 20 = no clean trend
  max_crypto_positions: 3          # Up to 3 crypto positions
  min_crypto_agreeing: 2           # crypto needs only 2/5 strategies
  min_crypto_score: 0.15           # Restored — 0.12 too loose for volatile crypto
  allow_shorts_in_bull: false      # Shorts in bull regime rarely pays off
  entry_timeframe: "5Min"          # 5-min candles for entries
  trend_timeframe: "1Day"          # daily candles for trend context
  intraday_lookback_days: 5        # how many days of 5-min bars to fetch

risk:
  leverage: 2.0                    # IB Reg-T overnight (2x). 4x intraday possible. Notional cap × leverage; risk budget stays on cash equity.
  max_position_pct: 0.08           # 8% per position cash basis → 16% leveraged
  max_portfolio_risk_pct: 0.015    # 1.5% risk per trade (stays on cash equity)
  stop_loss_atr_mult: 2.5          # Widened — 2.0 on 5-min ATR = noise, constant stops
  take_profit_atr_mult: 6.5        # Keep R:R ≈ 2.6 with wider SL (was 5.0 with 2.0 SL)
  min_risk_reward: 2.5             # Only take 2.5:1 R:R or better (good change)
  max_drawdown_pct: 0.10           # Restored — 12% is too much for paper testing
  trailing_stop_pct: 0.025         # Tighter trail to lock profits (was 3%)
  chandelier_atr_mult: 3.0         # ATR multiplier for Chandelier trailing stop
  max_checks_no_1r: 60             # Close if no 1R profit after 60 check cycles (~5 hours)
  trail_activate_r: 999            # Disabled — halved edge vs full TP on 10d/20sym
  partial_exit_enabled: false      # Disabled — clipped winners, PF 0.81 vs 1.60 baseline
  partial_exit_r: 1.2
  partial_exit_pct: 0.40
  second_partial_enabled: false    # Disabled — see above
  second_partial_r: 2.5
  second_partial_pct: 0.30
  daily_loss_limit_pct: 0.025      # 2.5% daily loss limit - tighter (was 3%)
  sizing_method: "kelly_fractional"     # kelly|kelly_fractional|volatility_adjusted (kelly path active once kelly_min_trades closed)
  kelly_fraction: 0.5                   # half-Kelly (DD safety vs full Kelly)
  kelly_min_trades: 30                  # below this many closed trades fall back to base risk_pct
  max_pct_of_adv: 0.01             # Cap order notional at 1% of 20d avg daily $vol (slippage guard)
  volatility_target:
    enabled: true
    target_annual_vol: 0.25
    lookback_bars: 20
    min_mult: 0.35
    max_mult: 1.50
  asset_overrides:
    stock:
      max_positions: 7
      max_position_pct: 0.08
      max_portfolio_risk_pct: 0.015
      min_risk_reward: 2.5
      contract_multiplier: 1
      allow_fractional_qty: false
      allow_shorts: false
      min_qty: 1
      min_score: 0.23
      min_agreeing: 3
      volatility_target:
        enabled: true
        target_annual_vol: 0.25
        lookback_bars: 20
        min_mult: 0.35
        max_mult: 1.35
    futures:
      max_positions: 0
      max_position_pct: 0.30
      max_portfolio_risk_pct: 0.015
      min_risk_reward: 1.8
      stop_loss_atr_mult: 1.5
      take_profit_atr_mult: 3.0
      min_score: 0.18
      min_agreeing: 2
      allow_fractional_qty: false
      allow_shorts: true
      min_qty: 1
      contract_multipliers:
        NQ: 20
        ES: 50
        CL: 1000
        GC: 100
        MNQ: 2
        MES: 5
        MCL: 100
        MGC: 10
      volatility_target:
        enabled: true
        target_annual_vol: 0.22
        lookback_bars: 20
        min_mult: 0.25
        max_mult: 1.00
    crypto:
      max_positions: 1
      max_position_pct: 0.12
      max_portfolio_risk_pct: 0.012
      min_risk_reward: 1.8
      stop_loss_atr_mult: 2.5
      take_profit_atr_mult: 5.0
      min_score: 0.20
      min_agreeing: 2
      contract_multiplier: 1
      allow_fractional_qty: true
      allow_shorts: false
      qty_decimals: 8
      min_qty: 0.000001
      volatility_target:
        enabled: true
        target_annual_vol: 0.25
        lookback_bars: 20
        min_mult: 0.25
        max_mult: 0.80
      regime_filter:
        enabled: true
        benchmark_symbol: "BTC/USD"
        ema_period: 20
        return_lookback_bars: 20
        min_benchmark_return: 0.0
        require_symbol_above_ema: true
        require_benchmark_above_ema: true

execution:
  smart_orders: true             # use limit @ NBBO midpoint for stock entries (saves ~half-spread)
  limit_offset_pct: 0.0002       # 2 bps better than market when crossing
  limit_timeout_sec: 30          # fall back to market after 30s without fill (live only)
  smart_entry_discount: 0.6      # backtest: scale entry impact to model midpoint fill

filters:
  max_correlation: 0.70         # block if correlation > 70%
  correlation_lookback_days: 60
  correlation_cache_minutes: 30
  regime_guard:
    enabled: true               # shared live/backtest guard for weak/choppy periods
    paper_only: true            # validation missed strict all-fold PF, so keep IB paper-only
    lookback_trades: 20
    min_trades: 8
    recent_wr_trades: 5
    caution_pf: 1.30            # PF below this tightens stock entries
    defensive_pf: 1.00          # PF below this enters defensive mode
    defensive_recent_wr: 0.30   # or last-5 win rate below 30%
    caution_size_mult: 0.75
    defensive_size_mult: 0.50
    caution_max_positions_mult: 0.75
    defensive_max_positions_mult: 0.50
    caution_min_score_add: 0.02
    defensive_min_score_add: 0.04
    caution_min_agreeing_add: 1
    defensive_min_agreeing: 5

backtest:
  slippage_pct: 0.001           # 10 basis points per fill (stocks)
  spread_pct: 0.0005            # 5 bps estimated half-spread cost per fill (stocks)
  futures_slippage_pct: 0.0005  # 5 bps per fill for futures
  futures_spread_pct: 0.0002    # 2 bps estimated half-spread for futures
  crypto_slippage_pct: 0.002    # 20 bps per fill (wider crypto spreads on Alpaca)
  crypto_spread_pct: 0.001      # 10 bps half-spread for crypto
  volume_impact: true           # extra slippage on large orders
  commission_per_share: 0.0     # Alpaca is commission-free (but spread matters)
  initial_equity: 100000
  # Stocks: ~15 bps round-trip | Crypto: ~60 bps round-trip

alerts:
  enabled: true                  # set to false to disable
  notify_trades: true            # new trade entries/exits
  notify_drawdown: true          # drawdown warnings
  notify_daily_summary: true     # end-of-day performance

edge:
  enabled: true
  earnings_avoidance: true
  earnings_block_days: 1          # hard-skip entries within N days of earnings
  news_sentiment: true           # Alpaca news + vader sentiment
  news_lookback_hours: 4
  news_sentiment_threshold: 0.5
  news_cache_ttl_sec: 1800       # 30 min per-symbol cache
  max_spread_pct: 0.0015
  ofi_weight: 0.05
  ml_filter_threshold: 0.55
  ml_min_trades: 100
  # Economic calendar gate
  econ_calendar: true
  econ_pre_block_min: 30          # block entries 30min before event
  econ_post_block_min: 60         # block entries 60min after event
  fomc_dates:                     # user-maintained quarterly; ET assumed
    - "2026-04-30T14:00:00"
    - "2026-06-18T14:00:00"
    - "2026-07-30T14:00:00"
    - "2026-09-17T14:00:00"
  # Pre-market gap filter
  gap_filter: true
  gap_normal_pct: 0.005           # <=0.5% = flat
  gap_large_pct: 0.03             # 0.5-3% normal; 3-5% large
  gap_extreme_pct: 0.05           # >5% extreme -> block
  gap_large_size_mult: 0.70       # reduce chase-direction sizing 30%
  # Insider Form 4 cluster buys (SEC EDGAR)
  insider_flow: true
  insider_lookback_days: 30
  insider_min_cluster: 2          # 2+ distinct insiders buying in window = cluster
  insider_boost_mult: 1.20        # 20% long-size boost on cluster
  insider_cache_ttl_sec: 86400    # 24h per-symbol cache
  # Relative strength rank (20d return vs universe)
  relative_strength: true
  rs_lookback_days: 20
  rs_ttl_sec: 3600                # 1h re-rank
  rs_top_boost: 1.20              # top 20% → +20% long size
  rs_bottom_penalty: 0.60         # bottom 20% → long blocked, short allowed
  # Market calendar (holidays / half-day early closes)
  market_calendar: true
  half_day_cutoff_hour: 12        # ET hour past which to block new entries on half-days
  # Volume surge conviction gate
  volume_gate: true
  volume_lookback_bars: 20
  volume_weak_ratio: 0.5          # ratio < 0.5 = weak → block
  volume_below_ratio: 1.2         # 0.5-1.2 = below avg
  volume_surge_ratio: 1.8         # >= 1.8 = surge → boost
  volume_below_mult: 0.80         # below-avg size multiplier
  volume_surge_mult: 1.15         # surge size boost
  volume_block_on_weak: true      # hard-block entries with weak vol
  # Leading regime gate. Stays generous on routine chop (ADX threshold low)
  # because the existing PF-based regime_guard already throttles via min_score.
  # Hard-blocks only on tail risk: panic vol or SPY trend break below EMA50.
  regime_gate:
    enabled: false                # tunable; default off — measure impact via A/B
    spy_adx_window: 14
    spy_adx_threshold: 12.0       # only extreme chop (ADX 14<12 ~ dead market)
    spy_vol_panic_pct: 35.0       # SPY 20d annualized vol > this = panic, block
    require_above_ema50: true     # require SPY > EMA50 — blocks bear regimes

sector_regime:
  enabled: true           # set false to disable sector layer entirely
  cache_ttl_sec: 900      # how long to cache sector ETF results (15 min)

ib:
  host: "127.0.0.1"
  port: 4002
  client_id: 1
  timeout_sec: 10

futures:
  contracts:
    - root: NQ
      exchange: CME
      description: "E-mini Nasdaq-100"
    - root: ES
      exchange: CME
      description: "E-mini S&P 500"
    - root: CL
      exchange: NYMEX
      description: "Crude Oil WTI"
    - root: GC
      exchange: COMEX
      description: "Gold"
    - root: MNQ
      exchange: CME
      description: "Micro E-mini Nasdaq-100"
    - root: MES
      exchange: CME
      description: "Micro E-mini S&P 500"
    - root: MCL
      exchange: NYMEX
      description: "Micro WTI Crude Oil"
    - root: MGC
      exchange: COMEX
      description: "Micro Gold"
  symbols:
    - MNQ
    - MES
    - MCL
    - MGC
  risk:
    stop_loss_atr_mult: 1.5
    take_profit_atr_mult: 3.0
    min_risk_reward: 2.0
    max_position_pct: 0.05

optimization:
  apr_target: 0.30
  max_drawdown_pct: 0.15
  assets: ["stocks", "futures", "crypto"]
  paper_only_on_partial_pass: true
  train_days: 180
  test_days: 60
  step_days: 30
  metric: "sharpe_ratio"
  max_param_combinations: 200
  strategy_filters:
    stock:
      # The router-side filter strips the sector_weights buckets down
      # to a single strategy, which forces the backtester to fall back
      # to regime-based select_strategies (broad 9-strat roster). That
      # fallback is the well-validated path on daily IB bars.
      enabled: ["relative_strength_rotation"]
      disabled: ["time_series_momentum", "donchian_breakout", "momentum", "supertrend", "futures_trend", "mean_reversion", "gap"]
    futures:
      enabled: ["time_series_momentum", "donchian_breakout", "futures_trend", "supertrend", "momentum"]
    crypto:
      enabled: ["time_series_momentum", "donchian_breakout", "relative_strength_rotation", "momentum", "supertrend"]

schedule:
  market_open_delay_min: 15    # skip first 15 min (volatile open)
  cycle_interval_sec: 300      # run every 5 minutes
  market_close_buffer_min: 15  # stop new trades 15 min before close
