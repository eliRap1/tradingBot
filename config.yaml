screener:
  min_price: 10.0
  max_price: 999999.0
  min_avg_volume: 300000
  # Dynamic universe selection (P2): rank universe_full by 20d return,
  # keep top 25% + activity-active syms. Static `universe` list always
  # included as mega-cap anchor.
  rs_universe: true
  rs_top_pct: 0.25              # keep top quartile (~36 of 145)
  rs_lookback_days: 20
  rs_cache_ttl_sec: 3600        # refresh hourly
  min_atr_pct: 0.010            # 1.0% daily range — drops dead REITs/utilities
  min_dollar_volume: 50000000   # $50M/day avg — liquidity floor
  # Top 20 mega-cap tech — tested 10d → PF 1.60, 52% hit rate, +0.65% ($647/$100k).
  # Full 142-sym universe tested: PF 1.02, 38% hit rate, +0.13% — diluted edge, drop it.
  # Extra syms live in universe_full below; switch later if rebalanced.
