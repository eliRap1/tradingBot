alpaca:
  paper_url: "https://paper-api.alpaca.markets"
  live_url: "https://api.alpaca.markets"
  data_url: "https://data.alpaca.markets"

screener:
  min_price: 10.0
  max_price: 1000.0
  min_avg_volume: 500000
  # Top liquid stocks - the bot will also filter dynamically
  universe:
    - AAPL
    - MSFT
    - GOOGL
    - AMZN
    - NVDA
    - META
    - TSLA
    - AMD
    - NFLX
    - JPM
    - V
    - MA
    - UNH
    - HD
    - DIS
    - PYPL
    - CRM
    - ADBE
    - INTC
    - CSCO
    - PEP
    - KO
    - COST
    - AVGO
    - QCOM
    - TXN
    - MU
    - AMAT
    - LRCX
    - KLAC
    - MRVL
    - PANW
    - NOW
    - UBER
    - ABNB
    - SQ
    - SHOP
    - SNOW
    - COIN
    - PLTR
  # Crypto (traded 24/7 on Alpaca)
  crypto:
    - BTC/USD
    - ETH/USD

strategies:
  momentum:
    rsi_period: 14
    rsi_overbought: 70
    rsi_oversold: 30
    roc_period: 10
    ema_fast: 8
    ema_slow: 21
    weight: 0.25

  mean_reversion:
    bb_period: 20
    bb_std: 2.0
    zscore_threshold: 1.5
    rsi_period: 14
    weight: 0.15

  breakout:
    volume_multiplier: 1.5
    atr_period: 14
    lookback_days: 20
    weight: 0.2

  supertrend:
    atr_period: 10
    multiplier: 3.0
    weight: 0.25

  stoch_rsi:
    rsi_period: 14
    stoch_period: 14
    k_smooth: 3
    d_smooth: 3
    ema_period: 50
    oversold: 20
    overbought: 80
    weight: 0.15

  vwap_reclaim:
    weight: 0.15

signals:
  min_composite_score: 0.25
  max_positions: 9
  min_agreeing_strategies: 3   # confluence: need 3/5 strategies to agree
  max_crypto_positions: 2      # separate slots for BTC/USD + ETH/USD
  min_crypto_agreeing: 2       # crypto needs only 2/5 strategies (24/7 market behaves differently)
  min_crypto_score: 0.15       # lower score threshold for crypto entries
  allow_shorts_in_bull: false  # block shorts in bull regime by default
  entry_timeframe: "5Min"      # 5-min candles for entries
  trend_timeframe: "1Day"      # daily candles for trend context
  intraday_lookback_days: 5    # how many days of 5-min bars to fetch

risk:
  max_position_pct: 0.08       # 8% of portfolio per position (~72% deployed with 9 positions, 28% reserve)
  max_portfolio_risk_pct: 0.015 # 1.5% risk per trade (slightly more aggressive)
  stop_loss_atr_mult: 2.0      # stop loss at 2x ATR below entry
  take_profit_atr_mult: 4.0    # take profit at 4x ATR (2:1 R:R on ATR)
  min_risk_reward: 2.0         # reject trades below 2:1 R:R
  max_drawdown_pct: 0.10       # 10% drawdown halts trading
  trailing_stop_pct: 0.03      # 3% trailing stop
  partial_exit_enabled: true    # close 50% at 1.5R, trail rest
  partial_exit_r: 1.5           # R-multiple to trigger first partial exit
  partial_exit_pct: 0.50        # close 50% of position at partial exit
  daily_loss_limit_pct: 0.03   # 3% daily loss limit — stop trading for day
  sizing_method: "fixed_fractional"  # "fixed_fractional" or "kelly"
  kelly_fraction: 0.5          # half Kelly (standard practice)
  kelly_min_trades: 30         # need 30 trades before Kelly activates

execution:
  smart_orders: false            # set true to use limit orders with fallback
  limit_offset_pct: 0.0002      # 2 bps better than market
  limit_timeout_sec: 30          # fall back to market after 30s

filters:
  max_correlation: 0.70         # block if correlation > 70%
  correlation_lookback_days: 60
  correlation_cache_minutes: 30

backtest:
  slippage_pct: 0.001           # 10 basis points per fill
  spread_pct: 0.0005            # 5 bps estimated half-spread cost per fill
  volume_impact: true           # extra slippage on large orders
  commission_per_share: 0.0     # Alpaca is commission-free (but spread matters)
  initial_equity: 100000
  # Total realistic cost: ~15 bps round-trip (10 slippage + 5 spread per side)

alerts:
  enabled: true                  # set to false to disable
  notify_trades: true            # new trade entries/exits
  notify_drawdown: true          # drawdown warnings
  notify_daily_summary: true     # end-of-day performance

optimization:
  train_days: 180
  test_days: 60
  step_days: 30
  metric: "sharpe_ratio"
  max_param_combinations: 200

schedule:
  market_open_delay_min: 15    # skip first 15 min (volatile)
  cycle_interval_sec: 300      # run every 5 minutes
  market_close_buffer_min: 15  # stop new trades 15 min before close
